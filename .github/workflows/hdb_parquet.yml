name: Scheduled HDB Data Sync to R2

on:
  schedule:
    # Triggers every Sunday at midnight UTC (8:00 AM Singapore Time)
    - cron: "0 0 * * 0"
  workflow_dispatch: # This adds a manual "Run workflow" button in the GitHub UI

jobs:
  run-sync-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Automatically caches installed pip packages to speed up future runs

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install polars pyarrow fsspec requests python-dotenv

      - name: Execute Data Sync Script
        env:
          SOURCE_API_KEY: ${{ secrets.SOURCE_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BASE_URL: "https://data.gov.sg/api/action/datastore_search"
          EXT_URL: "?resource_id=d_8b059b2e34d588b0d36b4038734cd28d"
        # Using the exact module execution syntax you just verified locally!
        run: python -m hdb_update
